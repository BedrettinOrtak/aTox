name: build-apk

on:
  push:
    branches: [master, modernize-ui-fast-connect-ptt]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tox4j:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: adopt
          java-version: 17
      - uses: sbt/setup-sbt@17575ea4e18dd928fe5968dbe32294b97923d65b # v1.11.13
        with:
          sbt-runner-version: 1.11.5
      - name: Set up cache
        id: cache
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository/org/toktok
          key: tox4j-${{ hashFiles('scripts/**') }}
      - name: Set up NDK
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | $SDKMANAGER "ndk;29.0.14206865"
      - name: Install tox4j dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt install -y yasm
      - name: Build tox4j
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          export ANDROID_NDK_HOME="${ANDROID_SDK_ROOT}/ndk/29.0.14206865"
          ./scripts/build-all -j$(nproc)
      - name: Upload tox4j
        uses: actions/upload-artifact@v7
        with:
          name: tox4j
          path: ~/.m2
          if-no-files-found: error
          include-hidden-files: true

  apk:
    runs-on: ubuntu-24.04
    needs: tox4j
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: adopt
          java-version: 17
      - name: Download tox4j
        uses: actions/download-artifact@v8
        with:
          name: tox4j
          path: ~/.m2
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          cache-read-only: false
      - name: Build debug APK
        run: ./gradlew :atox:assembleDebug
      - name: Build release APK
        run: ./gradlew :atox:assembleRelease
      - name: Rename APKs
        run: |
          mkdir -p out
          cp atox/build/outputs/apk/debug/atox-debug.apk      out/atox-modernized-debug.apk
          cp atox/build/outputs/apk/release/atox-release-unsigned.apk out/atox-modernized-release-unsigned.apk || true
      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: atox-apks
          path: out/*.apk
          if-no-files-found: error
      - name: Create / update GitHub Release
        if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-${{ github.run_number }}
          name: aTox modernized build #${{ github.run_number }}
          body: |
            Automated build of the modernized aTox fork.

            Includes:
            - Material 3 modernized UI
            - Faster initial Tox bootstrap (LAN-friendly retries)
            - Push-to-talk voice messages

            Files:
            - `atox-modernized-debug.apk` — debug build, installable directly.
            - `atox-modernized-release-unsigned.apk` — release build, unsigned.
          files: |
            out/atox-modernized-debug.apk
            out/atox-modernized-release-unsigned.apk
          fail_on_unmatched_files: false
